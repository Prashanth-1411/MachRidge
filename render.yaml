services:
  - type: web
    name: machridge-backend
    runtime: docker
    repo: https://github.com/Prashanth-1411/MachRidge.git
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: MachRidge Industries
      - key: APP_URL
        fromService:
          name: machridge-backend
          type: web
          property: url
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          name: machridge-db
          type: pserv
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: machridge
      - key: DB_USERNAME
        value: machridge
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: FILESYSTEM_DISK
        value: public
      - key: LOG_CHANNEL
        value: stderr

staticSites:
  - type: static
    name: machridge-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: machridge-backend
          type: web
          property: url
          path: /api
      - key: VITE_APP_NAME
        value: MachRidge Industries

databases:
  - name: machridge-db
    plan: free
    region: oregon
    databaseName: machridge
    user: machridge
    version: "8"
