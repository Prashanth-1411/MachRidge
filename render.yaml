services:
  - type: web
    name: machridge-backend
    runtime: docker
    repo: https://github.com/Prashanth-1411/MachRidge.git
    plan: free
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_NAME
        value: MachRidge Industries
      - key: APP_URL
        fromService:
          name: machridge-backend
          type: web
          property: hostport
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          name: machridge-db
          type: pserv
          property: host
      - key: DB_PASSWORD
        fromService:
          name: machridge-db
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: machridge
      - key: DB_USERNAME
        value: machridge
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_PORT
        value: 587
      - key: FILESYSTEM_DISK
        value: public
      - key: LOG_CHANNEL
        value: stderr

  - type: web
    name: machridge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://machridge-backend.onrender.com/api
      - key: VITE_APP_NAME
        value: MachRidge Industries

  - type: pserv
    name: machridge-db
    runtime: docker
    image: mysql:8.0
    plan: free
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: machridge
      - key: MYSQL_USER
        value: machridge
      - key: MYSQL_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
